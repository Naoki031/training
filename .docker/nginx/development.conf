map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    # Docker internal DNS resolver (prevents stale IPs after container restart)
    resolver 127.0.0.11 valid=10s ipv6=off;

    client_max_body_size 10m;

    # Bypass ngrok browser interstitial warning page
    add_header ngrok-skip-browser-warning "true" always;

    # Nuxt app
    location / {
        proxy_pass         http://client:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support for Nuxt HMR
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 86400;
    }

    # Nuxt HMR WebSocket endpoint
    location /_nuxt/hmr/ {
        proxy_pass         http://client:24678;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_read_timeout 86400;
    }

    # LiveKit WebRTC signaling (proxied so only 1 ngrok tunnel needed)
    location /livekit/ {
        proxy_pass                 http://livekit:7880/;
        proxy_http_version         1.1;
        proxy_set_header           Upgrade           $http_upgrade;
        proxy_set_header           Connection        $connection_upgrade;
        proxy_set_header           Host              $host;
        proxy_set_header           X-Real-IP         $remote_addr;
        proxy_read_timeout         86400;
        # Disable nginx buffering so LiveKit WebSocket frames are forwarded immediately.
        # Without this, nginx may hold partial frames in kernel buffer → extra latency.
        proxy_buffering            off;
        proxy_request_buffering    off;
        # Force TCP_NODELAY — disables Nagle's algorithm on the proxy socket.
        # Nagle batches small TCP segments up to 200ms; catastrophic for low-latency signaling.
        tcp_nodelay                on;
    }

    # Socket.IO WebSocket passthrough
    location /ws {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 86400;
    }

    # API passthrough
    location /api/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Uploaded files (bug report screenshots, etc.)
    location /uploads/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ZKTeco ICLOCK push protocol (device sends to /iclock/*)
    location /iclock/ {
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
