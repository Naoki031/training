networks:
  default:
    external:
      name: shared

services:
  nginx:
    build:
      context: .
      dockerfile: ./.docker/nginx/Dockerfile
      target: staging
    container_name: attendance
    restart: always
    depends_on:
      - client
      - api

  api:
    build:
      context: .
      dockerfile: ./.docker/node_server/Dockerfile
      target: server_staging
    container_name: attendance_api
    environment:
      NODE_ENV: production
      PORT: 3001
    env_file: .env.staging.docker
    volumes:
      - type: bind
        source: ./uploads
        target: /home/attendance_api/uploads
      - type: bind
        source: ./secrets
        target: /home/attendance_api/secrets
      - type: bind
        source: ./private-uploads
        target: /home/attendance_api/private-uploads
    restart: always

  client:
    build:
      context: .
      dockerfile: ./.docker/client/Dockerfile
      target: client-staging
    container_name: attendance_client
    environment:
      NODE_ENV: production
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
      PORT: 3000
    env_file: .env.staging.docker
    depends_on:
      - api
    volumes:
      - ./sources/attendance_client/public/firebase-messaging-sw.js:/home/attendance_client/.output/public/firebase-messaging-sw.js
    restart: always

  livekit:
    image: livekit/livekit-server:latest
    container_name: attendance_livekit
    entrypoint: ["sh", "/etc/livekit/entrypoint.sh"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50200:50000-50200/udp"
    env_file: .env.staging.docker
    volumes:
      - ./.docker/livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
      - ./.docker/livekit/entrypoint.sh:/etc/livekit/entrypoint.sh:ro
    restart: always

  coturn:
    image: coturn/coturn:latest
    container_name: attendance_coturn
    entrypoint: ["/bin/sh", "/etc/coturn/entrypoint.sh"]
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49152-49200:49152-49200/udp"
    env_file: .env.staging.docker
    volumes:
      - ./.docker/coturn/entrypoint.sh:/etc/coturn/entrypoint.sh:ro
    restart: always

  whisper:
    build:
      context: ./services/whisper
    container_name: attendance_whisper
    env_file: .env.staging.docker
    restart: always
