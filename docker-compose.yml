services:
  nginx:
    build:
      context: .
      dockerfile: ./.docker/nginx/Dockerfile
    container_name: attendance_nginx
    ports:
      - "80:80"
    volumes:
      - ./.docker/nginx/development.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      client:
        condition: service_started
      api:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: ./.docker/node_server/Dockerfile
      target: server_development
    container_name: attendance_api
    command: npm run start:dev
    environment:
      NODE_ENV: development
      PORT: 3001
    ports:
      - "3001:3001"
      - "9229:9229"
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ./sources/attendance_api:/home/attendance_api
      - attendance_api_node_modules:/home/attendance_api/node_modules
    restart: unless-stopped
    env_file:
      - ./sources/attendance_api/.env
    networks:
      - app-network

  client:
    build:
      context: .
      dockerfile: ./.docker/client/Dockerfile
      target: client-development
    container_name: attendance_client
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
    ports:
      - "3000:3000"
      - "24678:24678"
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./sources/attendance_client:/home/attendance_client
      - attendance_client_node_modules:/home/attendance_client/node_modules
      - attendance_client_nuxt:/home/attendance_client/.nuxt
    env_file:
      - ./sources/attendance_client/.env
    networks:
      - app-network
    restart: unless-stopped

  mariadb:
    build:
      context: .
      dockerfile: ./.docker/mariadb/Dockerfile
    container_name: attendance_mariadb
    ports:
      - "3306:3306"
    volumes:
      - datastore:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: attendance
      TZ: UTC
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app-network
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    container_name: attendance_livekit
    # entrypoint.sh composes LIVEKIT_KEYS from LIVEKIT_API_KEY/SECRET,
    # injects TURN credentials via sed, and passes --node-ip when set.
    entrypoint: ["sh", "/etc/livekit/entrypoint.sh"]
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50200:50000-50200/udp"
    env_file:
      - ./sources/attendance_api/.env
      - .env
    volumes:
      - ./.docker/livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro
      - ./.docker/livekit/entrypoint.sh:/etc/livekit/entrypoint.sh:ro
    networks:
      - app-network
    restart: unless-stopped

  coturn:
    image: coturn/coturn:latest
    container_name: attendance_coturn
    entrypoint: ["/bin/sh", "/etc/coturn/entrypoint.sh"]
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49152-49200:49152-49200/udp"
    env_file:
      - .env
    volumes:
      - ./.docker/coturn/entrypoint.sh:/etc/coturn/entrypoint.sh:ro
    networks:
      - app-network
    restart: unless-stopped

  whisper:
    build:
      context: ./services/whisper
    container_name: attendance_whisper
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - whisper_cache:/root/.cache/whisper
    networks:
      - app-network
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    container_name: attendance_ngrok
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http nginx:80
    ports:
      - "4040:4040"
    depends_on:
      - nginx
    networks:
      - app-network
    profiles:
      - ngrok
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  datastore:
  attendance_api_node_modules:
  attendance_client_node_modules:
  attendance_client_nuxt:
  whisper_cache:
